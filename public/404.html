<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 | Crimson Tiles</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #0E1E2B;
        color: #F5F1E8;
        font-family: 'Inter', system-ui, sans-serif;
        line-height: 1.6;
        padding: 2rem;
      }
      .wrap { text-align: center; max-width: 480px; }
      .code {
        font-family: 'Space Grotesk', sans-serif;
        font-size: clamp(4rem, 12vw, 7rem);
        font-weight: 700;
        color: #D0103A;
        letter-spacing: -0.04em;
        line-height: 1;
        margin-bottom: 1rem;
      }
      h1 {
        font-family: 'Space Grotesk', sans-serif;
        font-size: clamp(1.5rem, 3vw, 2rem);
        font-weight: 700;
        margin-bottom: 0.75rem;
      }
      p {
        color: rgba(245, 241, 232, 0.7);
        margin-bottom: 2rem;
      }
      a {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        background: #9E1B32;
        color: #F5F1E8;
        font-weight: 600;
        padding: 0.85rem 1.75rem;
        border-radius: 8px;
        text-decoration: none;
        transition: background 0.2s, transform 0.2s;
      }
      a:hover {
        background: #D0103A;
        transform: translateY(-2px);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="code">404</div>
      <h1>this page doesn't exist.</h1>
      <p>misclick, dead link, or wandering. either way it's not here.</p>
      <a href="/">← back to crimson tiles</a>
    </div>
  </body>
</html>
